body:
  text: 正文人以陽氣為主陰常有餘陽常不足近世醫工乃倡為補陰之議其方以黃柏為君以知母地黃諸寒藥為佐合服升斗以為可以保生噫左矣人之虛勞不足怠情嗜臥眩運痹塞諸厥上逆滿悶痞隔誰則使之陽氣虧損之所致也乃助其陰而耗其陽乎人之一身飲食男女居處運動皆由陽氣若陰氣則隨陽運動而主持諸血者也故人之陽損但當補之溫之溫補既行則陽氣長盛而百病除焉醫之用術惟吐利汗下與解表攻裡之法耳不能一病而自為一法也今人遇病立方動輒二十餘品少亦不下數品豈知仲景諸名醫之心法哉吾觀古人率用成方加減不過一二味非有違戾未嘗輒易正謂宜汗宜吐宜下宜解表裡者病情有限故攻病之法亦有限也豈得動用已見隨意立方耶藥性有刑反忌宜處味既多莫識其性為害不少故余欲世人須洞識病情恪遵古劑而後可藥籠中物何所不可用貴當病情耳今醫工見藥味平緩者肆意增損呼為醫中王道人亦利其無患而藥就之若稍涉性氣猛利之藥則束手不敢用稍用之人爭指為狼虎不之近噫工師斷木尚取斧斤之利者於用藥則取其鈍而舍其利何哉以此知不敢用猛烈之藥皆不深脈理不明病情者也邵堯夫曰百病起於情情輕病亦輕諸病孰非起於情耶蓋人生以氣為主情過喜則氣散怒則氣升哀則氣消勞則氣耗驚則氣亂思則氣結欲則氣傾寒則氣收靈則氣泄病由之作矣識破知節病亦少損若著物不止不為有生患哉故君子貴保性而不任情斯養氣延年之術也病者去而來復已而復作者陽衰而不能制疾故耳今不能養陽而屢事攻擊有疾者利則易生矣有寒者寒去則裡虛矣有疾者積下則胃寒矣其病至復作也奚疑故凡病情一去之後即當頤神養性放下萬緣調息百日以生陽氣逮於陽氣既盛則陰邪不能幹而舊疾無自作矣若病情少事閒即事酬應嘯傲如常至於復作則危期將至矣先大夫有訓云元氣與脾氣原無二致人之元氣充足則脾氣自然磨運而元氣愈充若元氣虛眇則脾不能運而脹滿痞氣之疾作矣不肖素稟衰弱年來脾眚時作因有感於先君至教謹識於此余幼抱脾眚飲食下輒作脹滿思之未得其原嘗讀東垣論云氣聚於脾中不得散故時作脹滿誠中現情矣但未解治之之方也後讀醫學拾遺治痞論云熱既在上則內中寒凝而氣不下行故當用熱藥以溫中焦而下引其熱使熱得降也又産後論云非由血能搶心乃榮衛不充中焦不治氣失所依而上奔於心耳夫氣聚則行寒則凝行則病散凝則疾生邪氣乘虛不在淤血之有無故乾薑為産後要藥辛熱故也但當溫暖正氣以致和平則百疾無由生也以此互觀則東垣氣聚脾中之旨昭昭明矣附子大黃醫者俱畏而不用然往往有因而得力者嘗聞許北門云昔患脾泄經年不愈請教於鄭淡泉令用棗附丸附子用童便煮制經日末之棗肉煉為丸依服神驗近學院謝蚪蜂每日進枳殼大黃丸二三服神才清爽都憲張廬山止之弗聽而謝體質愈充藥性之宜於人非庸醫所能識也今之治目者大都用涼藥點治不知目者血之華血得熱則行得寒則凝古人點目以冰片乾薑所以散其邪於外也故精明之府不可一毫楂滓當外傳熱藥以散其邪則睛膜舒轉內用溫藥以和其血則血脈通利目未有不可治者但外用熱藥若甚痛不可忍然拔去邪毒所謂一勞永佚者此醫藥拾遺之論揭之目得血而能視血冷則凝此理易明也而醫則罕知之鄰有管連雲之乃眷目患沿眶紅爛數年愈甚百計治之不能療為延吳御醫診之曰吾得之矣為治大熱之劑數服其病如脫目復明問之曰此不難知也此女人進涼藥多矣用大熱劑則凝血復散前藥皆得奏功此可為治眼之良法吳忘其名專用附子人呼為吳附子云高安姚姓年三十時患弱氣息僅屬亦涉醫書欲取附子服之初皆疑弗與後病將殆不得已聽之服至一斤許疾遂愈生三子今近七旬常疑其或作附毒竟無也雖老猶間服之不輟顧色泉老醫年六十有五因盛怒疽發於背大如盂四圍色黑召瘍醫治之用冷藥敷貼敷已覺涼約七八日後為用刀去淤肉顧俟其去曰四圍色黑乃血滯更加冷藥非其治也乃更治熱敷藥去舊藥敷之覺甚癢終夜明日色鮮紅焮腫亦消惟中起數十孔如蜂房一日許又覺噁心作噦視一人頭如兩人頭自疹曰此虛極證也用參附大劑進二服視已正矣不數日竟愈終無刀針之苦噫用藥系人生死若此證危如纍卵稍一誤投難乎哉顧色泉云凡瘡毒屬陰者必用熱藥如天雄附子之類皆生用庶可起死回生余問其證曰如對口陰發伏疽捫不知痛疽不起泡四圍如墨黑者是老人虛弱之症尤宜用之竊以為瘡之陰陽一時難辨瘍醫遇此率用寒涼殺人多矣熱藥回生其功甚巨稍涉遲疑生死反掌丹溪之治吐衄率用黃柏一味或並用芩連生地門冬等味名曰滋陰降火近有議其後者曰元氣虧損之人有何火降乃虛證耳復令脾胃冰寒陽氣衰敗何以自全此所以沉困纍年而後己也余以為丹溪之見未可全非而議之者意良是今遇前證應以丹溪之法降其上升浮游之火俟炎火退然後逐其淤血而以補助元陽溫和血氣之藥收功不亦可乎家僕名貫者之金陵路遘寒證餌藥少瘥故好酒即飲酒一二甌及水飯一盂病乃大作氣喘急吐痰竟夕不寐連三日余曰病且急矣奈何請醫與商榷以瓜蒂散吐之遂吐痰幾半桶後吐一塊如豬腦血食相裹不二三日遂起婦女病患率多心腹疼痛痞滿諸疾大都由於氣血凝聚致然庸醫妄投藥餌補之則益患稍削之則損元氣治之當有法先大夫宦長沙張碧泉夫人病血蠱腹痛甚已死先大夫令用薑蔥麝香真血竭尉其臍經行而病愈一婦人患血痞服藥多方未效張小泉用通利行氣之藥為餅貼其臍半日頻氣泄而散可見病在下者湯飲未易效須以意揣量治之使消散於下可也痘疹之發根於骨髓臟腑與諸瘡不同曾有人年十五歲而出者問之云極痛不可忍渾身如列鐵釘殆不能展側沉虛明善幼科一貴公止一子將之官與別沉囑之曰出痘切莫用藥用藥則反傷生上痘不必用藥下痘用藥亦無功中痘則須藥扶持然未必得人則不如不藥之為愈也既而貴公之任其子出痘不藥而愈竟如沈言家妹年七歲下痢純血時丁倭亂徒避吳中醫者已辭救矣先憲副公語不肖當可救否曰痢疾起於氣滯兒欲飲以萬病解毒丹下之疏通其氣庶幾可治乃磨服一錠未可因再磨服一錠厥明大下即進粥兩甌其病遂愈以此知解毒丹之效神妙莫比一名紫金錠子具載方書王典者徽人寓京師通籍太醫院徐南湖為侍御時嘗識之且屢驗其方藥每記憶之晚歸鄉患腸癖下血諸醫治弗愈且殆南湖曰吾思用王典醫為致書召之王至診其病曰非腸癖也連進黃硝之劑大下之復診曰病未盡也再進前劑復下痰積桶余曰可以治矣調理而愈所下穢更無血積腸癖遂除以此見腹為熱滯不能通血腸胃逼窄而血下耳衆醫皆以血治故不效也南湖自此更十年患他病殂曾憶某醫書論倒倉一法非丹溪心印乃云傳自西域異人者恐門人妄記也夫虛羸之人雖有積聚止宜養正積除豈宜傾瀉倉廩以損正氣此可戒也其言良是南都一醫者最稱知名士又善導引術偶苦壅滯因用前法大瀉不能起於廁遂殞余問其年則六十餘矣夫六十餘者豈宜行大吐下之法哉以是知醫者不貴知法及又貴知理此醫豈能明於盈虛消息之理哉一富室患中寒陰證名醫盈座最後延吳御醫至診之曰非附子莫救但忘攜來令人之市揀極重者三枚生切為一劑計重三兩投之衆醫吐舌潛減其半以兩半為劑進之病遂已吳復診曰何減吾成藥也問之知減其半噫嘻吾投三枚將令活三年也今止活年半耳後年余復病而卒脈藥之神如此張鶴仙名醫也其醫效有足採者張嘉興人少孤始攜藥囊入吾郡未知名也一日郁溫州水軒患陽證傷寒稟氣又薄群醫束手不敢下曰脈已絶矣下之則死張疹其足脈其獨大曰可治遂投大承氣湯一而愈名遂振後有巡院楊裁庵者按脈證如前郁薦之復愈由是吳之稱名醫者首鶴仙召視者滿吳下終其身取效無慮數百多以大黃之功俗遂稱張大黃云自己常進大黃丸子合許曰此瀉南方補北方人弗知也年九十卒錢漸川幼文勤苦久之抱郁成疾上焦苦咽閉中焦苦隔噎煩悶下焦則苦遺濁極而嘔血幾殆衆醫治之罔效偶值常熟顧愛杏至以疾叩請詢衆治按曰諸君治法未嘗誤也而弗效者證雜而藥淆也今請分治之上焦用藥清火解毒食飽服之中焦用藥開鬱除食後服之下焦用藥升降水火空心服之品不過三四劑不過五六俱奏驗病若失後強健如故登仕版此明醫不失治之效與因病服藥喻如因漏艌船艙久木朽則油料無所用矣是知舟之載以木非以艙人之生以氣非以藥今人竭精神以遂外物疲有用以事無用曰吾有藥焉是以鑿舟沉舸而恃艌哉先輩沉東老性淡泊五旬余合服人乳藥丸子久不輟年八十五卒卒之前半歲藥不能進矣製附子須大熟不爾則有癰疽之禍耳聞中附子毒而發瘍者如武林童南恆是已童年五十好長生術交與多方士有進熱藥以助陽者童信之中有附子全劑百丸僅進四十五丸疽發於腦竟卒詢知附子性毒多上升故中其毒者未嘗不發毒腦背多至不救藥不可不慎也雖然童所進藥當不止附子應是群諸熱藥為劑故其禍極烈耳世人相傳灸不著抵吃藥遂比屋不拘何病一概攻至有因灸反甚荏苒年月以亡者可惜也不知藏寒而病滿與體厚而形充者法宜灸安有病弱之人肢體羸瘦而顧概施火攻為也火攻為病百端而耗血為尤盛不可不知或問其目曰虛者不灸弱者不灸脈浮者不灸脈微數者不灸濕家身痛煩者不灸若不審其宜而概加灸焫其不至於危殆者幾希俗傳花香不宜嗅嗅之易生癆瘵余嘗驗之晨起見夜合花其時含蕊將放窺中有細黑蟲縱橫不計其數少頃花大開復窺其中無有矣其花傍坐亦未見有一蟲飛出倏忽之間何以始夥而終無以此見嗅得花香非得香也得蟲也香盛則成蟲其理有不可測者附經目屢驗良方太極光統治男婦大小百病惡症瘡疽腫毒筋骨疼痛左癱右瘓諸症孔雀尾四錢用甘草水洗撮土搓之復用水洗淨曬乾為末純用是尾端圓處更勝乳香沒藥各去油淨蜈蚣全蠍磁石火煅麝香各二錢螻蛄曬乾雄黃醋浸透換白蘿蔔汁煮用硃砂各三錢水銀五錢牙硝一兩二錢五分硫黃二兩五錢上共為一處碾成細末文火用磁碗一隻將藥末每錢許匙挑入碗內以竹刀炒如米粒大小不等勿令焦枯收入磁瓶封固聽用每症各取藥置患處以火焠著灸之灸時要避風如遍身風氣痛則置藥於各處骨節間遍灸之重症灸後須避風七日神效紺雪丹專治一切目疾並去翳膜如神六月雪根燒灰存性冰片量加上不拘多少共乳極細收用加熊膽少許更神去老膜翳障神方珍珠豆腐煮研荸薺粉各四分熊膽箸皮上焙乾陀僧硃砂各水飛蕤仁去油各三分硇砂白丁香水飛各二分上為細末如面磁瓶收固用金銀角簪點患處口疳散薄荷末三錢兒茶一錢五分黃柏一分珍珠生甘草各五分冰片三分龍骨醋煅二分白芷二分五釐腫痛加倍上共為極細末遇口疳吹之神效初起熱甚倍薄荷久病多加珍珠兒茶龍骨即長肉痘疹後去黃柏龍骨加牛黃疳重加滴乳香硃砂各少許青蓮散專治一切喉風生蛾等症山豆根兒茶胡連各一錢川黃連三分冰片一分青魚膽二錢上共乳極細收固聽用吹之立愈臌症第一方當歸白朮白芍各二兩茯苓檳榔常山酒浸焙透草果各一兩枳殼厚朴青皮無鹽醋拌炒陳皮各一兩五錢上共為細末加細針砂粉四兩和勻每日服兩次用三分以紅棗七枚已嚼服藥及愈後禁鹽百日永戒食牛肉如犯背平腳底平臍凸乃不治之症不必服金彈丸專治小兒急驚結胸等症奇效牛黃珍珠各四分琥珀川鬱金半夏射干礞石火硝煅各二錢硃砂水飛明雄黃各一錢陳膽星川貝母天竺黃巴豆去殼淨各四錢甘草生薑各三錢冰片麝香各一分上共為細末煉白蜜為丸每粒重三分金箔為衣或熔蠟為丸護之更妙疝氣方新鮮大小薊根不拘多少上一味搗爛酒煎服立效一切腫毒初起煎方金銀花紫花地丁各一兩用井水二碗河水二碗煎成二碗去渣入後藥加當歸一錢白芷陳皮各二錢甘草八分用前藥水煎成一碗加水酒一碗入後藥加乳香沒藥土貝母各二錢穿山甲三片共煎成一碗去渣服神驗乳毒加蒲公英一兩祕寶圍藥方治一切腫毒陳墨碾碎二錢川大黃二兩藤黃六錢黃柏五錢冰片麝香各五分雄豬膽五個陳醋生薑自然汁各一小杯上將藥共為末和豬膽陳醋薑汁搗勻作錠子曬乾每用陳醋磨塗患處散腫拔毒生肌神效太乙五行膏統治一切無名腫毒牛蹄甲馬蹄甲驢蹄甲豬蹄甲羊蹄甲各五兩連翹三稜莪朮黑醜白醜木香胡連沙參地骨皮元參柴胡各一錢五分白芥子天花粉各一錢山查麥芽神麯各六分上先將五蹄甲入麻油二斤四兩熬枯去渣再入連翹等十六味熬焦濾清俟油熬至滴水成珠為度再入陶丹一斤二兩水飛收膏攤貼患處散腫拔毒生肌神效惟眉心耳後忌貼紫靈丹專治瘡癤腫毒冰片麝香乳香去油沒藥去油各四錢八分血竭一兩二錢硃砂一錢前胡元參各一錢二分母丁香八分班毛一兩六錢淨去頭足翅用糯米炒上共為細末收固每用少許放膏上貼患處拔疔膏野菊花山慈菰升麻瓦炙血竭各一錢五分天花粉一錢七葉一枝花紫花地丁木耳皂角刺各瓦炙硃砂水飛淨各三錢川貝母去心知母各瓦炙或用黃酒煮透焙乾亦可蟾酥各三錢酒化不見火生甘草麝香各五分萆麻子肉一兩去殼衣搗爛用上藥除麝香蟾酥血竭萆麻子肉硃砂六味余概用瓦炙存性同前藥為極細末同萆麻肉搗爛成膏如干加山東胭脂如無即麻油亦可用時先將銀針刺破疔根入此膏少許掩以膏藥一對周時疔自拔出矣玉燕膏治瘰癧痰核祕方川山甲全蠍白芷黃連全當歸黃芩各二兩生地赤芍番木鱉甲各一兩官桂海藻各四兩上用麻油二斤四兩入鍋熬枯去渣淨入飛丹十兩黃蠟七錢白蠟三錢鉛粉二兩收成膏投入水浸取起晾乾再入鍋熔化加乳香沒藥輕粉各二錢麝香雄黃硃砂各一錢朝北燕窠泥雄鼠糞各五錢血竭一兩共為細末離火入前膏內攪勻收貯又方黑貓一隻不拘大小務要狗咬死者連皮毛腸肚全用上用麻油熬化濾去渣將油熬至滴水成珠入黃丹收成膏藥攤貼患處神效膿疥瘡煎方川芎大腹皮丹皮生首烏牛蒡子當歸紅花赤芍金銀花生甘草各一錢上加燈心二十根水煎服五六劑後再搽沒藥花椒末大風子肉白芷硫黃檳榔等分為細末雄豬油同搗極爛搽之透骨湯專治跌打損傷滿身青紫危重者皆效五加皮自然銅青皮紫荊皮杜仲紅花川山甲白蒺藜歸尾乳香沒藥以上各一錢活土鱉三個搗碎沖上用水煎服外加透骨草更神傷骨者加尋骨風心慌者加硃砂輕者一劑至重者二劑無不愈接骨紫金丹土鱉酒炙去足淨乳香沒藥歸尾酒炒自然銅醋煅七次各三錢血竭大黃酒炒骨碎補去毛打碎酒浸曬乾硼砂各一錢上共為細末磁瓶收貯跌打損傷瘀血攻心好酒下一分八釐破傷吐血不止者用當歸桃仁紅花各五分煎酒下荔奴散專治一切金瘡跌磕龍眼核不拘多少燒灰存性上為細末收貯敷傷處立愈解鉛粉毒緑豆粉一兩牙硝二錢檳榔末五分上共為細末每用清米湯調如稀糊一匙一匙漸次進服不可太急候吐止腹內不痛大便瀉盡方可飲清米湯然後吃粥調理蛇咬神方硃砂麝香各二分雄黃三分牙硝五分殼珠即假珠火炙一分豬牙皂角瓦炙五個萆麻子十粒去殼炙上為細末磁瓶收固用時將傷處銀針挑破點藥少許並點眼角片時流去毒水立效治小兒臍風撮口方巴豆一粒去殼研爛明雄黃一錢乳細上二味和勻每用三五粒新汲井水調下覺胸腹有響聲大便下痰即愈此症最危百無一治亦少妙劑此方神效勿略之治痘毒神方用白瑞香花葉不拘多少入冰糖少許同搗極爛敷之初起即消已成即潰已潰收功他方醫愈後或年餘數月復發者無不神效震升丸專治痔瘡並腸風下血荷葉不拘多少燒灰存性上一味用生鱔魚血合搗為丸如桐子大每早空心白湯下三四錢治噤曰痢方用燕窠泥不拘多少研末同鴨蛋青調勻入麝香三分小兒二分敷臍上泥干又以蛋清潤之一二日即愈黃芽丸治胃強脾弱能食不能消者並脾泄等症制穀芽四兩半生半炒製法用糯谷三四升韭葉搗汁浸數日候谷出芽取起篩盛微日曬略干即以韭菜汁灑之以芽帶緑色為度曬乾聽用人參一兩如不用以黨參黃耆代之芡實二兩炒蓮子肉四兩去心取肉連皮入豬肚內煮透去肚曬乾上共為細末用荷葉一張煮汁和山藥末打糊為丸如緑豆大每服二錢米飲下日三次治脫疽方此症發於足指漸上至膝色黑痛不可忍逐節脫落而斃至惡之症也亦有發於手指者同治用土蜂房一個研細醋調搽應手而愈真仙方也湯火傷用生薑不拘多少搗爛撲之又方冬月收壞橘不拘多少貯磁瓶中封置靜處日久自化為清水用時取水塗患處神效絞腸痧方取旱芹菜搗汁飲下立愈瘤疒贅驗方川貝母不拘多少嚼時時敷之不過月餘自潰而愈頭上打破如雞子大傷痕奇效方白麻石內有石筋石線取出研細末敷滿布包扎好三日長肉生肌屢驗離骨取牙方烏梅十七個童便浸春夏秋兩日冬三日甘草水漂過上二味等分陰陽瓦焙乾研細每末一錢加黃牙丹五分拌勻但看骨槽風有骨橫在牙床者用糯米漿少許拌藥成條塞在骨縫兩邊塞滿如無縫即散放牙縫內一日兩次上藥二十日其骨自動再著眼明手輕之人鉗去之切不可將藥誤黏好齒致傷好牙此方甚神而奇黃牙丹此丹去汙生新治疳要藥汞一兩藤黃五分牙硝明礬各一兩五錢蛇含石八分上共研勻結胎武火升煉三炷香取藥每一兩加冰片四分收貯聽用
